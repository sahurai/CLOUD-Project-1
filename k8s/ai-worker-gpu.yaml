apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-worker-gpu
  namespace: glaucoma
  labels:
    app: ai-worker-gpu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-worker-gpu
  template:
    metadata:
      labels:
        app: ai-worker-gpu
    spec:
      containers:
        - name: ai-worker
          image: glaucoma/ai-worker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 6Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 20
          env:
            - name: NODE_TYPE
              value: "High-Performance GPU"
            - name: MODEL_DIR
              value: /app/models
            - name: LOAD_TEST_CPU_BURN_SECONDS
              value: "0.8"
          volumeMounts:
            - name: models
              mountPath: /app/models
              readOnly: true
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: models-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ai-worker-gpu
  namespace: glaucoma
spec:
  selector:
    app: ai-worker-gpu
  ports:
    - port: 8001
      targetPort: 8001
