apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-balancer
  namespace: glaucoma
  labels:
    app: load-balancer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: load-balancer
  template:
    metadata:
      labels:
        app: load-balancer
    spec:
      containers:
        - name: load-balancer
          image: glaucoma/load-balancer:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          env:
            - name: CPU_BACKEND
              value: "http://ai-worker-cpu:8001"
            - name: GPU_BACKEND
              value: "http://ai-worker-gpu:8001"
            - name: SIZE_THRESHOLD
              value: "2500000"
---
apiVersion: v1
kind: Service
metadata:
  name: load-balancer
  namespace: glaucoma
spec:
  selector:
    app: load-balancer
  ports:
    - port: 8080
      targetPort: 8080
