apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: glaucoma
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: glaucoma/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8501
          env:
            - name: BACKEND_URL
              value: "http://load-balancer:8080"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: glaucoma
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 8501
      targetPort: 8501
      nodePort: 30501
