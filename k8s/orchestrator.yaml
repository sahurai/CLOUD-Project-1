# Orchestrator: control-plane HTTP API on top of the load balancer.
# Owns config, validation, demo runner. Talks to the cluster via kubectl
# (in-pod) using the ServiceAccount + Role defined below.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: orchestrator
  namespace: glaucoma
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: orchestrator
  namespace: glaucoma
rules:
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch", "update"]
  # `kubectl set env` issues a PATCH against deployments/scale + deployments,
  # which the rule above already covers. The line below is for status reads.
  - apiGroups: ["apps"]
    resources: ["deployments/status"]
    verbs: ["get"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: orchestrator
  namespace: glaucoma
subjects:
  - kind: ServiceAccount
    name: orchestrator
    namespace: glaucoma
roleRef:
  kind: Role
  name: orchestrator
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: orchestrator-config
  namespace: glaucoma
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 32Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: glaucoma
  labels:
    app: orchestrator
spec:
  replicas: 1
  strategy:
    # Recreate avoids two pods racing on the config file (RWO PVC).
    type: Recreate
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      serviceAccountName: orchestrator
      containers:
        - name: orchestrator
          image: glaucoma/orchestrator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9000
          env:
            - name: ORCH_LISTEN
              value: ":9000"
            - name: ORCH_CONFIG
              value: "/var/lib/orchestrator/config.json"
            - name: ORCH_LB_URL
              value: "http://load-balancer:8080"
            - name: ORCH_NAMESPACE
              value: "glaucoma"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /var/lib/orchestrator
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: orchestrator-config
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: glaucoma
spec:
  type: NodePort
  selector:
    app: orchestrator
  ports:
    - port: 9000
      targetPort: 9000
      nodePort: 30900
