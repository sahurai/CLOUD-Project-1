worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/json;

    # Logic: Analyze the size of the incoming data (Content-Length)
    # If the file is larger than ~2.5MB (2621440 bytes), route to GPU
    map $content_length $ai_backend {
        default       http://ai-worker-cpu:8001;
        # Routing high-resolution images to high-performance nodes
        "~^[0-9]{7,}$" http://ai-worker-gpu:8001; 
    }

    server {
        listen 80;

        # Increase max upload size for high-res fundus photographs
        client_max_body_size 20M;

        # Dynamic routing for the prediction endpoint
        location /predict/ {
            proxy_pass $ai_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Standard routing for the model list (can go to any node)
        location /models/ {
            proxy_pass http://ai-worker-cpu:8001;
            proxy_set_header Host $host;
        }
    }
}