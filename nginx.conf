worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/json;

    # Logic: Analyze the size of the incoming data (Content-Length)
    # If the file is larger than ~2.5MB (2,500,000 bytes), route to GPU
    map $content_length $ai_backend {
        default                    http://ai-worker-cpu:8001;
        "~^[0-9]{8,}$"            http://ai-worker-gpu:8001;   # >= 10,000,000 (8+ digits)
        "~^[3-9][0-9]{6}$"        http://ai-worker-gpu:8001;   # 3,000,000 - 9,999,999
        "~^2[5-9][0-9]{5}$"       http://ai-worker-gpu:8001;   # 2,500,000 - 2,999,999
    }

    server {
        listen 80;

        # Docker embedded DNS resolver (required when proxy_pass uses a variable)
        resolver 127.0.0.11 valid=30s;

        # Increase max upload size for high-res fundus photographs
        client_max_body_size 20M;

        # Dynamic routing for the prediction endpoint
        location /predict/ {
            proxy_pass $ai_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Standard routing for the model list (can go to any node)
        location /models/ {
            proxy_pass http://ai-worker-cpu:8001;
            proxy_set_header Host $host;
        }
    }
}